<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="bg-image">
    <img
        src="../images/artistic1-2.jpg"
        alt="Profile Avatar"
        class="bg-image"
    >
  </div>
  <div class="card">
    <img
      src="../images/avatars/flynn.png"
      alt="Profile Avatar"
      class="avatar"
    >

    <h2 class="name">Flynn Wilson</h2>

    <p class="bio">
      Regular guy. Likes all the things you like & mildly dislikes things you hate. You can trust me I prommy
    </p>
  </div>

</body>
</html>
